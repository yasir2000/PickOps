# Agent Configuration — WebOps
# Auto-generated by generate_agent_structures.py

agent:
  id: webops-agent
  name: "Web Operations Agent"
  version: "1.0.0"
  domain: "WebOps"
  emoji: "🌐"
  description: >
    Operate web infrastructure including CDN management, performance optimization, security, and deployments.

llm:
  provider: ollama          # Switch to: openai | anthropic | azure
  model: llama3
  base_url: http://ollama:11434
  temperature: 0.1
  max_tokens: 4096
  fallback_provider: openai
  fallback_model: gpt-4o

memory:
  enabled: true
  provider: redis
  url: redis://redis:6379
  ttl_seconds: 86400
  vector_store: qdrant

tools:
  - name: cloudflare
    enabled: true
  - name: fastly
    enabled: true
  - name: lighthouse
    enabled: true
  - name: webpagetest
    enabled: true
  - name: prometheus
    enabled: true
  - name: grafana
    enabled: true
  - name: nextjs
    enabled: true

workflows:
  - cdn-management-pipeline
  - performance-optimization
  - security-header-enforcement
  - edge-deployment

human_in_the_loop:
  enabled: true
  triggers:
    - destructive_action
    - high_cost_operation
    - compliance_critical
  approval_channel: slack
  timeout_seconds: 300

observability:
  tracing: true
  tracing_provider: langsmith
  metrics: true
  metrics_port: 9090
  log_level: INFO

security:
  secrets_provider: vault
  vault_addr: http://vault:8200
  credential_rotation_days: 90
  audit_log: true

rate_limits:
  requests_per_minute: 60
  tokens_per_minute: 100000
