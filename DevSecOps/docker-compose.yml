version: '3.8'

services:
  sonarqube:
    image: sonarqube:community
    container_name: devsecops-sonarqube
    ports:
      - "9000:9000"
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://postgres:5432/sonar
      - SONAR_JDBC_USERNAME=sonar
      - SONAR_JDBC_PASSWORD=${SONAR_DB_PASSWORD}
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - devsecops-network

  owasp-zap:
    image: owasp/zap2docker-stable
    container_name: devsecops-zap
    ports:
      - "8090:8080"
      - "8091:8090"
    command: zap-webswing.sh
    restart: unless-stopped
    networks:
      - devsecops-network

  trivy-server:
    image: aquasec/trivy:latest
    container_name: devsecops-trivy
    ports:
      - "8081:8080"
    command: server --listen 0.0.0.0:8080
    volumes:
      - trivy_cache:/root/.cache
    restart: unless-stopped
    networks:
      - devsecops-network

  anchore-engine:
    image: anchore/anchore-engine:latest
    container_name: devsecops-anchore
    ports:
      - "8228:8228"
    environment:
      - ANCHORE_DB_HOST=postgres
      - ANCHORE_DB_PASSWORD=${ANCHORE_DB_PASSWORD}
    depends_on:
      - postgres
    volumes:
      - anchore_data:/var/lib/anchore
    restart: unless-stopped
    networks:
      - devsecops-network

  vault:
    image: hashicorp/vault:latest
    container_name: devsecops-vault
    ports:
      - "8200:8200"
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=${VAULT_ROOT_TOKEN}
      - VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    volumes:
      - vault_data:/vault/data
      - vault_logs:/vault/logs
    restart: unless-stopped
    networks:
      - devsecops-network

  opa:
    image: openpolicyagent/opa:latest
    container_name: devsecops-opa
    ports:
      - "8181:8181"
    command: run --server --log-level=info
    volumes:
      - ./policies:/policies
    restart: unless-stopped
    networks:
      - devsecops-network

  gitleaks:
    image: zricethezav/gitleaks:latest
    container_name: devsecops-gitleaks
    volumes:
      - ./repos:/repos
    command: detect --source /repos --verbose
    restart: "no"
    networks:
      - devsecops-network

  defectdojo:
    image: defectdojo/defectdojo-django:latest
    container_name: devsecops-defectdojo
    ports:
      - "8000:8080"
    environment:
      - DD_DATABASE_URL=postgresql://defectdojo:${DEFECTDOJO_DB_PASSWORD}@postgres:5432/defectdojo
      - DD_SECRET_KEY=${DEFECTDOJO_SECRET_KEY}
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - devsecops-network

  postgres:
    image: postgres:15
    container_name: devsecops-postgres
    environment:
      - POSTGRES_USER=devsecops
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - devsecops-network

volumes:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  trivy_cache:
  anchore_data:
  vault_data:
  vault_logs:
  postgres_data:

networks:
  devsecops-network:
    driver: bridge
