version: '3.8'

services:
  temporal:
    image: temporalio/auto-setup:latest
    container_name: sagaops-temporal
    ports:
      - "7233:7233"
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PWD=${DB_PASSWORD}
      - POSTGRES_SEEDS=postgres
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development.yaml
    volumes:
      - ./configs/temporal:/etc/temporal/config/dynamicconfig
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - sagaops-network

  temporal-ui:
    image: temporalio/ui:latest
    container_name: sagaops-temporal-ui
    ports:
      - "8088:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    depends_on:
      - temporal
    restart: unless-stopped
    networks:
      - sagaops-network

  camunda:
    image: camunda/camunda-bpm-platform:latest
    container_name: sagaops-camunda
    ports:
      - "8080:8080"
    environment:
      - DB_DRIVER=org.postgresql.Driver
      - DB_URL=jdbc:postgresql://postgres:5432/camunda
      - DB_USERNAME=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - sagaops-network

  eventstore:
    image: eventstore/eventstore:latest
    container_name: sagaops-eventstore
    ports:
      - "2113:2113"
      - "1113:1113"
    environment:
      - EVENTSTORE_CLUSTER_SIZE=1
      - EVENTSTORE_RUN_PROJECTIONS=All
      - EVENTSTORE_START_STANDARD_PROJECTIONS=true
      - EVENTSTORE_EXT_TCP_PORT=1113
      - EVENTSTORE_HTTP_PORT=2113
      - EVENTSTORE_INSECURE=true
      - EVENTSTORE_ENABLE_EXTERNAL_TCP=true
      - EVENTSTORE_ENABLE_ATOM_PUB_OVER_HTTP=true
    volumes:
      - eventstore_data:/var/lib/eventstore
    restart: unless-stopped
    networks:
      - sagaops-network

  axon-server:
    image: axoniq/axonserver:latest
    container_name: sagaops-axon
    ports:
      - "8024:8024"
      - "8124:8124"
    environment:
      - AXONIQ_AXONSERVER_NAME=axonserver
      - AXONIQ_AXONSERVER_HOSTNAME=axon-server
    volumes:
      - axon_data:/data
      - axon_events:/eventdata
    restart: unless-stopped
    networks:
      - sagaops-network

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: sagaops-kafka
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
    depends_on:
      - zookeeper
    volumes:
      - kafka_data:/var/lib/kafka/data
    restart: unless-stopped
    networks:
      - sagaops-network

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: sagaops-zookeeper
    ports:
      - "2181:2181"
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    restart: unless-stopped
    networks:
      - sagaops-network

  debezium:
    image: debezium/connect:latest
    container_name: sagaops-debezium
    ports:
      - "8083:8083"
    environment:
      - BOOTSTRAP_SERVERS=kafka:9092
      - GROUP_ID=1
      - CONFIG_STORAGE_TOPIC=debezium_connect_configs
      - OFFSET_STORAGE_TOPIC=debezium_connect_offsets
      - STATUS_STORAGE_TOPIC=debezium_connect_statuses
    depends_on:
      - kafka
    restart: unless-stopped
    networks:
      - sagaops-network

  saga-coordinator:
    build:
      context: ./saga-coordinator
      dockerfile: Dockerfile
    container_name: sagaops-coordinator
    ports:
      - "8000:8000"
    environment:
      - TEMPORAL_HOST=temporal:7233
      - EVENTSTORE_HOST=eventstore:2113
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      - temporal
      - eventstore
      - kafka
    restart: unless-stopped
    networks:
      - sagaops-network

  postgres:
    image: postgres:15
    container_name: sagaops-postgres
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_MULTIPLE_DATABASES=temporal,camunda,sagaops
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - sagaops-network

  redis:
    image: redis:7-alpine
    container_name: sagaops-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - sagaops-network

  prometheus:
    image: prom/prometheus:latest
    container_name: sagaops-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    restart: unless-stopped
    networks:
      - sagaops-network

  grafana:
    image: grafana/grafana:latest
    container_name: sagaops-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    networks:
      - sagaops-network

volumes:
  eventstore_data:
  axon_data:
  axon_events:
  kafka_data:
  zookeeper_data:
  zookeeper_logs:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  sagaops-network:
    driver: bridge
