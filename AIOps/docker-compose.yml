version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: aiops-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    restart: unless-stopped
    networks:
      - aiops-network

  grafana:
    image: grafana/grafana:latest
    container_name: aiops-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_INSTALL_PLUGINS=grafana-ml-app
    volumes:
      - grafana_data:/var/lib/grafana
      - ./configs/grafana:/etc/grafana/provisioning
    restart: unless-stopped
    networks:
      - aiops-network

  loki:
    image: grafana/loki:latest
    container_name: aiops-loki
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    networks:
      - aiops-network

  promtail:
    image: grafana/promtail:latest
    container_name: aiops-promtail
    volumes:
      - /var/log:/var/log
      - ./configs/promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped
    networks:
      - aiops-network

  mimir:
    image: grafana/mimir:latest
    container_name: aiops-mimir
    ports:
      - "9009:9009"
    volumes:
      - mimir_data:/data
    command: -config.file=/etc/mimir/demo.yaml
    restart: unless-stopped
    networks:
      - aiops-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: aiops-elasticsearch
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms2g -Xmx2g"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    restart: unless-stopped
    networks:
      - aiops-network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: aiops-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    restart: unless-stopped
    networks:
      - aiops-network

  prophet-server:
    build:
      context: ./prophet
      dockerfile: Dockerfile
    container_name: aiops-prophet
    ports:
      - "5000:5000"
    environment:
      - PROMETHEUS_URL=http://prometheus:9090
    restart: unless-stopped
    networks:
      - aiops-network

  alertmanager:
    image: prom/alertmanager:latest
    container_name: aiops-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./configs/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    restart: unless-stopped
    networks:
      - aiops-network

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
  mimir_data:
  elasticsearch_data:
  alertmanager_data:

networks:
  aiops-network:
    driver: bridge
