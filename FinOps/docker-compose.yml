version: '3.8'

services:
  kubecost:
    image: gcr.io/kubecost1/cost-model:latest
    container_name: finops-kubecost
    ports:
      - "9090:9090"
    environment:
      - PROMETHEUS_SERVER_ENDPOINT=http://prometheus:9090
    volumes:
      - kubecost_data:/var/configs
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - finops-network

  opencost:
    image: quay.io/kubecost1/kubecost-cost-model:latest
    container_name: finops-opencost
    ports:
      - "9003:9003"
    environment:
      - PROMETHEUS_SERVER_ENDPOINT=http://prometheus:9090
      - CLOUD_PROVIDER_API_KEY=${CLOUD_API_KEY}
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - finops-network

  infracost:
    image: infracost/infracost:latest
    container_name: finops-infracost
    ports:
      - "8080:8080"
    environment:
      - INFRACOST_API_KEY=${INFRACOST_API_KEY}
    volumes:
      - ./terraform:/terraform
    restart: unless-stopped
    networks:
      - finops-network

  prometheus:
    image: prom/prometheus:latest
    container_name: finops-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=90d'
    restart: unless-stopped
    networks:
      - finops-network

  grafana:
    image: grafana/grafana:latest
    container_name: finops-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./configs/grafana/dashboards:/etc/grafana/provisioning/dashboards
    restart: unless-stopped
    networks:
      - finops-network

  postgres:
    image: postgres:15
    container_name: finops-postgres
    environment:
      - POSTGRES_USER=finops
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=finops
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - finops-network

  cloud-custodian:
    image: cloudcustodian/c7n:latest
    container_name: finops-custodian
    volumes:
      - ./policies:/policies
      - ./output:/output
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AZURE_SUBSCRIPTION_ID=${AZURE_SUBSCRIPTION_ID}
    restart: "no"
    networks:
      - finops-network

  cost-api:
    build:
      context: ./cost-api
      dockerfile: Dockerfile
    container_name: finops-api
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://finops:${POSTGRES_PASSWORD}@postgres:5432/finops
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - finops-network

volumes:
  kubecost_data:
  prometheus_data:
  grafana_data:
  postgres_data:

networks:
  finops-network:
    driver: bridge
