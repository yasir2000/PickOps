global
    maxconn 4096
    log stdout format raw local0

defaults
    mode http
    log global
    option httplog
    option dontlognull
    timeout connect 5s
    timeout client 50s
    timeout server 50s

frontend http-in
    bind *:8080
    default_backend services

backend services
    balance roundrobin
    option httpchk GET /health
    http-check expect status 200
    server service1 localhost:8081 check inter 5s fall 3 rise 2
    server service2 localhost:8082 check inter 5s fall 3 rise 2
    server service3 localhost:8083 check inter 5s fall 3 rise 2

listen stats
    bind *:9000
    stats enable
    stats uri /
    stats refresh 10s
    stats admin if TRUE
