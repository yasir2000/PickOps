# Agent Configuration — SporOps
# Auto-generated by generate_agent_structures.py

agent:
  id: sporops-agent
  name: "Sports Operations Agent"
  version: "1.0.0"
  domain: "SporOps"
  emoji: "⚽"
  description: >
    Automate sports team management, performance analytics, fan engagement, and venue operations.

llm:
  provider: ollama          # Switch to: openai | anthropic | azure
  model: llama3
  base_url: http://ollama:11434
  temperature: 0.1
  max_tokens: 4096
  fallback_provider: openai
  fallback_model: gpt-4o

memory:
  enabled: true
  provider: redis
  url: redis://redis:6379
  ttl_seconds: 86400
  vector_store: qdrant

tools:
  - name: postgresql
    enabled: true
  - name: kafka
    enabled: true
  - name: redis
    enabled: true
  - name: fastapi
    enabled: true
  - name: grafana
    enabled: true
  - name: wearable
    enabled: true
  - name: stripe
    enabled: true

workflows:
  - performance-analytics-pipeline
  - team-management-workflow
  - fan-engagement-automation
  - venue-operations

human_in_the_loop:
  enabled: true
  triggers:
    - destructive_action
    - high_cost_operation
    - compliance_critical
  approval_channel: slack
  timeout_seconds: 300

observability:
  tracing: true
  tracing_provider: langsmith
  metrics: true
  metrics_port: 9090
  log_level: INFO

security:
  secrets_provider: vault
  vault_addr: http://vault:8200
  credential_rotation_days: 90
  audit_log: true

rate_limits:
  requests_per_minute: 60
  tokens_per_minute: 100000
