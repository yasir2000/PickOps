version: '3.8'

services:
  # vLLM - High-performance LLM inference
  vllm:
    image: vllm/vllm-openai:latest
    container_name: llmops-vllm
    ports:
      - "8000:8000"
    environment:
      - MODEL_NAME=${MODEL_NAME:-meta-llama/Llama-2-7b-chat-hf}
      - TENSOR_PARALLEL_SIZE=${TENSOR_PARALLEL_SIZE:-1}
      - MAX_MODEL_LEN=${MAX_MODEL_LEN:-4096}
      - HUGGING_FACE_HUB_TOKEN=${HUGGINGFACE_TOKEN}
    volumes:
      - vllm_models:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${GPU_COUNT:-1}
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - llmops-network

  # Text Generation Inference - HuggingFace serving
  text-generation-inference:
    image: ghcr.io/huggingface/text-generation-inference:2.0
    container_name: llmops-tgi
    ports:
      - "8001:80"
    environment:
      - MODEL_ID=${TGI_MODEL_ID:-meta-llama/Llama-2-7b-chat-hf}
      - NUM_SHARD=${NUM_SHARD:-1}
      - MAX_INPUT_LENGTH=${MAX_INPUT_LENGTH:-1024}
      - MAX_TOTAL_TOKENS=${MAX_TOTAL_TOKENS:-2048}
      - HUGGING_FACE_HUB_TOKEN=${HUGGINGFACE_TOKEN}
    volumes:
      - tgi_models:/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${GPU_COUNT:-1}
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - llmops-network

  # Ollama - Local LLM runtime
  ollama:
    image: ollama/ollama:latest
    container_name: llmops-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${GPU_COUNT:-1}
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - llmops-network

  # MLflow - Experiment tracking
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.10.0
    container_name: llmops-mlflow
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_BACKEND_STORE_URI=${MLFLOW_BACKEND_STORE_URI:-sqlite:///mlflow.db}
      - MLFLOW_ARTIFACT_ROOT=${MLFLOW_ARTIFACT_ROOT:-/mlflow/artifacts}
    volumes:
      - mlflow_data:/mlflow
    command: >
      mlflow server
      --backend-store-uri ${MLFLOW_BACKEND_STORE_URI:-sqlite:///mlflow.db}
      --default-artifact-root ${MLFLOW_ARTIFACT_ROOT:-/mlflow/artifacts}
      --host 0.0.0.0
      --port 5000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - llmops-network

  # Qdrant - Vector database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: llmops-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY}
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - llmops-network

  # Prometheus - Metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: llmops-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    restart: unless-stopped
    networks:
      - llmops-network

  # Grafana - Visualization
  grafana:
    image: grafana/grafana:latest
    container_name: llmops-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./configs/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./configs/grafana/datasources:/etc/grafana/provisioning/datasources
    restart: unless-stopped
    depends_on:
      - prometheus
    networks:
      - llmops-network

  # Nginx - API Gateway
  nginx:
    image: nginx:alpine
    container_name: llmops-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./configs/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./configs/ssl:/etc/nginx/ssl:ro
    restart: unless-stopped
    depends_on:
      - vllm
      - text-generation-inference
      - mlflow
    networks:
      - llmops-network

volumes:
  vllm_models:
  tgi_models:
  ollama_models:
  mlflow_data:
  qdrant_storage:
  prometheus_data:
  grafana_data:

networks:
  llmops-network:
    driver: bridge
