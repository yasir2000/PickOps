version: '3.8'

services:
  airflow:
    image: apache/airflow:2.8.0
    container_name: dataops-airflow
    ports:
      - "8080:8080"
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:${AIRFLOW_DB_PASSWORD}@postgres/airflow
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW_FERNET_KEY}
      - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW_SECRET_KEY}
    volumes:
      - airflow_dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      - airflow_plugins:/opt/airflow/plugins
    depends_on:
      - postgres
    command: webserver
    restart: unless-stopped
    networks:
      - dataops-network

  airflow-scheduler:
    image: apache/airflow:2.8.0
    container_name: dataops-airflow-scheduler
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:${AIRFLOW_DB_PASSWORD}@postgres/airflow
    volumes:
      - airflow_dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      - airflow_plugins:/opt/airflow/plugins
    depends_on:
      - postgres
    command: scheduler
    restart: unless-stopped
    networks:
      - dataops-network

  nifi:
    image: apache/nifi:latest
    container_name: dataops-nifi
    ports:
      - "8443:8443"
    environment:
      - NIFI_WEB_HTTPS_PORT=8443
      - SINGLE_USER_CREDENTIALS_USERNAME=admin
      - SINGLE_USER_CREDENTIALS_PASSWORD=${NIFI_PASSWORD}
    volumes:
      - nifi_conf:/opt/nifi/nifi-current/conf
      - nifi_data:/opt/nifi/nifi-current/flowfile_repository
      - nifi_logs:/opt/nifi/nifi-current/logs
    restart: unless-stopped
    networks:
      - dataops-network

  spark-master:
    image: bitnami/spark:latest
    container_name: dataops-spark-master
    ports:
      - "8081:8080"
      - "7077:7077"
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
    volumes:
      - spark_data:/opt/spark-data
    restart: unless-stopped
    networks:
      - dataops-network

  spark-worker:
    image: bitnami/spark:latest
    container_name: dataops-spark-worker
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
    depends_on:
      - spark-master
    restart: unless-stopped
    networks:
      - dataops-network

  datahub:
    image: linkedin/datahub-gms:latest
    container_name: dataops-datahub
    ports:
      - "9002:8080"
    environment:
      - DATAHUB_ANALYTICS_ENABLED=true
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - dataops-network

  airbyte:
    image: airbyte/airbyte:latest
    container_name: dataops-airbyte
    ports:
      - "8000:8000"
    environment:
      - DATABASE_USER=airbyte
      - DATABASE_PASSWORD=${AIRBYTE_DB_PASSWORD}
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_DB=airbyte
    depends_on:
      - postgres
    volumes:
      - airbyte_data:/data
    restart: unless-stopped
    networks:
      - dataops-network

  postgres:
    image: postgres:15
    container_name: dataops-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=dataops
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_MULTIPLE_DATABASES=airflow,airbyte,datahub
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - dataops-network

  redis:
    image: redis:7-alpine
    container_name: dataops-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - dataops-network

volumes:
  airflow_dags:
  airflow_logs:
  airflow_plugins:
  nifi_conf:
  nifi_data:
  nifi_logs:
  spark_data:
  airbyte_data:
  postgres_data:
  redis_data:

networks:
  dataops-network:
    driver: bridge
