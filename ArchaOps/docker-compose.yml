version: '3.8'

services:
  # Core Database
  postgres:
    image: postgres:15-alpine
    container_name: ${STACK_NAME}-postgres
    environment:
      - POSTGRES_DB=${STACK_NAME}
      - POSTGRES_USER=${STACK_NAME}
      - POSTGRES_PASSWORD=${POSTGRES_PASS:-password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - ${STACK_NAME}-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ${STACK_NAME}-redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - ${STACK_NAME}-network

  # API Backend
  backend:
    image: node:20-alpine
    container_name: ${STACK_NAME}-backend
    working_dir: /app
    command: sh -c "npm install && npm start"
    environment:
      - DATABASE_URL=postgresql://${STACK_NAME}:${POSTGRES_PASS:-password}@postgres:5432/${STACK_NAME}
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./backend:/app
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    depends_on:
      - postgres
      - redis
    networks:
      - ${STACK_NAME}-network

  # Frontend
  frontend:
    image: nginx:alpine
    container_name: ${STACK_NAME}-frontend
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./configs/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend
    networks:
      - ${STACK_NAME}-network

  # Message Queue
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: ${STACK_NAME}-rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASS:-admin}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    ports:
      - "${AMQP_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    networks:
      - ${STACK_NAME}-network

  # Analytics - Metabase
  metabase:
    image: metabase/metabase:v0.48.0
    container_name: ${STACK_NAME}-metabase
    environment:
      - MB_DB_TYPE=postgres
      - MB_DB_DBNAME=metabase
      - MB_DB_PORT=5432
      - MB_DB_USER=${STACK_NAME}
      - MB_DB_PASS=${POSTGRES_PASS:-password}
      - MB_DB_HOST=postgres
    ports:
      - "${METABASE_PORT:-3001}:3000"
    depends_on:
      - postgres
    volumes:
      - metabase-data:/metabase-data
    networks:
      - ${STACK_NAME}-network

  # Monitoring - Prometheus
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: ${STACK_NAME}-prometheus
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - ${STACK_NAME}-network

  # Dashboards - Grafana
  grafana:
    image: grafana/grafana:10.2.0
    container_name: ${STACK_NAME}-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASS:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3002}:3000"
    networks:
      - ${STACK_NAME}-network

networks:
  ${STACK_NAME}-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  metabase-data:
  prometheus-data:
  grafana-data:
