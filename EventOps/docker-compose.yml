version: '3.8'

services:
  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: eventops-kafka
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
    depends_on:
      - zookeeper
    volumes:
      - kafka_data:/var/lib/kafka/data
    restart: unless-stopped
    networks:
      - eventops-network

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: eventops-zookeeper
    ports:
      - "2181:2181"
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    restart: unless-stopped
    networks:
      - eventops-network

  schema-registry:
    image: confluentinc/cp-schema-registry:latest
    container_name: eventops-schema-registry
    ports:
      - "8081:8081"
    environment:
      - SCHEMA_REGISTRY_HOST_NAME=schema-registry
      - SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS=kafka:9092
      - SCHEMA_REGISTRY_LISTENERS=http://0.0.0.0:8081
    depends_on:
      - kafka
    restart: unless-stopped
    networks:
      - eventops-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: eventops-kafka-ui
    ports:
      - "8080:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
      - KAFKA_CLUSTERS_0_ZOOKEEPER=zookeeper:2181
      - KAFKA_CLUSTERS_0_SCHEMAREGISTRY=http://schema-registry:8081
    depends_on:
      - kafka
      - schema-registry
    restart: unless-stopped
    networks:
      - eventops-network

  pulsar:
    image: apachepulsar/pulsar:latest
    container_name: eventops-pulsar
    ports:
      - "6650:6650"
      - "8082:8080"
    command: bin/pulsar standalone
    volumes:
      - pulsar_data:/pulsar/data
    restart: unless-stopped
    networks:
      - eventops-network

  pulsar-manager:
    image: apachepulsar/pulsar-manager:latest
    container_name: eventops-pulsar-manager
    ports:
      - "9527:9527"
      - "7750:7750"
    environment:
      - SPRING_CONFIGURATION_FILE=/pulsar-manager/pulsar-manager/application.properties
    depends_on:
      - pulsar
    restart: unless-stopped
    networks:
      - eventops-network

  nats:
    image: nats:latest
    container_name: eventops-nats
    ports:
      - "4222:4222"
      - "8222:8222"
      - "6222:6222"
    command: "-js -m 8222"
    volumes:
      - nats_data:/data
    restart: unless-stopped
    networks:
      - eventops-network

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: eventops-redpanda
    ports:
      - "19092:19092"
      - "19644:9644"
    command:
      - redpanda
      - start
      - --smp
      - '1'
      - --reserve-memory
      - 0M
      - --overprovisioned
      - --node-id
      - '0'
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:19092
      - --advertise-kafka-addr
      - PLAINTEXT://localhost:19092
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    restart: unless-stopped
    networks:
      - eventops-network

  flink-jobmanager:
    image: flink:latest
    container_name: eventops-flink-jobmanager
    ports:
      - "8083:8081"
    command: jobmanager
    environment:
      - JOB_MANAGER_RPC_ADDRESS=flink-jobmanager
    volumes:
      - flink_data:/opt/flink/data
    restart: unless-stopped
    networks:
      - eventops-network

  flink-taskmanager:
    image: flink:latest
    container_name: eventops-flink-taskmanager
    command: taskmanager
    environment:
      - JOB_MANAGER_RPC_ADDRESS=flink-jobmanager
    depends_on:
      - flink-jobmanager
    restart: unless-stopped
    networks:
      - eventops-network

  kafka-connect:
    image: confluentinc/cp-kafka-connect:latest
    container_name: eventops-kafka-connect
    ports:
      - "8083:8083"
    environment:
      - CONNECT_BOOTSTRAP_SERVERS=kafka:9092
      - CONNECT_REST_PORT=8083
      - CONNECT_GROUP_ID=compose-connect-group
      - CONNECT_CONFIG_STORAGE_TOPIC=docker-connect-configs
      - CONNECT_OFFSET_STORAGE_TOPIC=docker-connect-offsets
      - CONNECT_STATUS_STORAGE_TOPIC=docker-connect-status
      - CONNECT_KEY_CONVERTER=org.apache.kafka.connect.json.JsonConverter
      - CONNECT_VALUE_CONVERTER=org.apache.kafka.connect.json.JsonConverter
      - CONNECT_REST_ADVERTISED_HOST_NAME=kafka-connect
    depends_on:
      - kafka
    restart: unless-stopped
    networks:
      - eventops-network

  ksqldb-server:
    image: confluentinc/ksqldb-server:latest
    container_name: eventops-ksqldb
    ports:
      - "8088:8088"
    environment:
      - KSQL_BOOTSTRAP_SERVERS=kafka:9092
      - KSQL_LISTENERS=http://0.0.0.0:8088
      - KSQL_KSQL_SCHEMA_REGISTRY_URL=http://schema-registry:8081
    depends_on:
      - kafka
      - schema-registry
    restart: unless-stopped
    networks:
      - eventops-network

  prometheus:
    image: prom/prometheus:latest
    container_name: eventops-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    restart: unless-stopped
    networks:
      - eventops-network

  grafana:
    image: grafana/grafana:latest
    container_name: eventops-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    networks:
      - eventops-network

volumes:
  kafka_data:
  zookeeper_data:
  zookeeper_logs:
  pulsar_data:
  nats_data:
  redpanda_data:
  flink_data:
  prometheus_data:
  grafana_data:

networks:
  eventops-network:
    driver: bridge
