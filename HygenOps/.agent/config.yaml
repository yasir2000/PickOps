# Agent Configuration — HygenOps
# Auto-generated by generate_agent_structures.py

agent:
  id: hygenops-agent
  name: "Hygiene Operations Agent"
  version: "1.0.0"
  domain: "HygenOps"
  emoji: "🧼"
  description: >
    Manage hygiene compliance, sanitation scheduling, audit tracking, and supply management for facilities.

llm:
  provider: ollama          # Switch to: openai | anthropic | azure
  model: llama3
  base_url: http://ollama:11434
  temperature: 0.1
  max_tokens: 4096
  fallback_provider: openai
  fallback_model: gpt-4o

memory:
  enabled: true
  provider: redis
  url: redis://redis:6379
  ttl_seconds: 86400
  vector_store: qdrant

tools:
  - name: postgresql
    enabled: true
  - name: fastapi
    enabled: true
  - name: grafana
    enabled: true
  - name: slack
    enabled: true
  - name: sendgrid
    enabled: true
  - name: minio
    enabled: true

workflows:
  - sanitation-scheduling
  - audit-pipeline
  - compliance-monitoring
  - supply-reorder-trigger

human_in_the_loop:
  enabled: true
  triggers:
    - destructive_action
    - high_cost_operation
    - compliance_critical
  approval_channel: slack
  timeout_seconds: 300

observability:
  tracing: true
  tracing_provider: langsmith
  metrics: true
  metrics_port: 9090
  log_level: INFO

security:
  secrets_provider: vault
  vault_addr: http://vault:8200
  credential_rotation_days: 90
  audit_log: true

rate_limits:
  requests_per_minute: 60
  tokens_per_minute: 100000
