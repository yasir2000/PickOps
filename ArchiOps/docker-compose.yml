version: '3.8'

services:
  # PostgreSQL - Architecture Projects Database
  postgres:
    image: postgres:15-alpine
    container_name: archiops-postgres
    environment:
      - POSTGRES_DB=archiops
      - POSTGRES_USER=archiops
      - POSTGRES_PASSWORD=${POSTGRES_PASS:-archiops2024}
      - POSTGRES_MULTIPLE_DATABASES=projects,bim,designs,portfolios
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./configs/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - archiops-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U archiops"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - Session Cache & Real-time Collaboration
  redis:
    image: redis:7-alpine
    container_name: archiops-redis
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - archiops-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # MinIO - BIM Files, 3D Models & Blueprint Storage
  minio:
    image: minio/minio:latest
    container_name: archiops-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_PASS:-minioadmin123}
    volumes:
      - minio-data:/data
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    networks:
      - archiops-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # FreeCAD - Open Source CAD Platform
  freecad-web:
    image: linuxserver/webtop:ubuntu-kde
    container_name: archiops-freecad
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
      - TITLE=FreeCAD ArchiOps
    volumes:
      - freecad-config:/config
      - freecad-projects:/projects
    ports:
      - "${FREECAD_PORT:-3010}:3000"
    networks:
      - archiops-network

  # BIMServer - Building Information Modeling
  bimserver:
    image: opensourcebim/bimserver:latest
    container_name: archiops-bimserver
    environment:
      - BIMSERVER_ADDRESS=0.0.0.0
      - BIMSERVER_PORT=8080
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=bim
      - POSTGRES_USER=archiops
      - POSTGRES_PASSWORD=${POSTGRES_PASS:-archiops2024}
    volumes:
      - bimserver-data:/bimserver/home
    ports:
      - "${BIMSERVER_PORT:-8081}:8080"
    depends_on:
      - postgres
    networks:
      - archiops-network

  # Draw.io - Architecture Diagrams & Blueprints
  drawio:
    image: jgraph/drawio:latest
    container_name: archiops-drawio
    environment:
      - DRAWIO_BASE_URL=http://localhost:8083
      - DRAWIO_CSP_HEADER=default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'
    ports:
      - "${DRAWIO_PORT:-8083}:8080"
    networks:
      - archiops-network

  # Structurizr - Software Architecture Documentation (C4 Model)
  structurizr:
    image: structurizr/lite:latest
    container_name: archiops-structurizr
    volumes:
      - ./workspaces:/usr/local/structurizr
    ports:
      - "${STRUCTURIZR_PORT:-8084}:8080"
    networks:
      - archiops-network

  # PlantUML - Architecture Diagram as Code
  plantuml:
    image: plantuml/plantuml-server:latest
    container_name: archiops-plantuml
    environment:
      - BASE_URL=plantuml
    ports:
      - "${PLANTUML_PORT:-8085}:8080"
    networks:
      - archiops-network

  # Mermaid Live Editor - Architecture Visualization
  mermaid:
    image: ghcr.io/mermaid-js/mermaid-live-editor:latest
    container_name: archiops-mermaid
    ports:
      - "${MERMAID_PORT:-8086}:80"
    networks:
      - archiops-network

  # Excalidraw - Collaborative Whiteboarding
  excalidraw:
    image: excalidraw/excalidraw:latest
    container_name: archiops-excalidraw
    ports:
      - "${EXCALIDRAW_PORT:-8087}:80"
    networks:
      - archiops-network

  # Architecture API Backend
  backend:
    image: node:20-alpine
    container_name: archiops-backend
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://archiops:${POSTGRES_PASS:-archiops2024}@postgres:5432/archiops
      - REDIS_URL=redis://redis:6379
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=${MINIO_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_PASS:-minioadmin123}
      - JWT_SECRET=${JWT_SECRET:-archiops-secret-key-2024}
      - API_PORT=3000
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    depends_on:
      - postgres
      - redis
      - minio
    networks:
      - archiops-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Architecture Portal Frontend
  frontend:
    image: nginx:alpine
    container_name: archiops-frontend
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./configs/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend
    networks:
      - archiops-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  # RabbitMQ - Architecture Events & Collaboration
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: archiops-rabbitmq
    hostname: archiops-rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASS:-archiops123}
      - RABBITMQ_DEFAULT_VHOST=archiops
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    ports:
      - "${AMQP_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    networks:
      - archiops-network
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 5

  # Elasticsearch - Full-text Search for Designs & Documentation
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: archiops-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"
    networks:
      - archiops-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Kibana - Search & Analytics Dashboard
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: archiops-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_NAME=archiops-kibana
    ports:
      - "${KIBANA_PORT:-5601}:5601"
    depends_on:
      - elasticsearch
    networks:
      - archiops-network

  # Metabase - Architecture Project Analytics
  metabase:
    image: metabase/metabase:v0.48.0
    container_name: archiops-metabase
    environment:
      - MB_DB_TYPE=postgres
      - MB_DB_DBNAME=metabase
      - MB_DB_PORT=5432
      - MB_DB_USER=archiops
      - MB_DB_PASS=${POSTGRES_PASS:-archiops2024}
      - MB_DB_HOST=postgres
    ports:
      - "${METABASE_PORT:-3001}:3000"
    depends_on:
      - postgres
    volumes:
      - metabase-data:/metabase-data
    networks:
      - archiops-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 60s
      timeout: 10s
      retries: 3

  # Gitea - Architecture Documentation & Version Control
  gitea:
    image: gitea/gitea:latest
    container_name: archiops-gitea
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=postgres:5432
      - GITEA__database__NAME=gitea
      - GITEA__database__USER=archiops
      - GITEA__database__PASSWD=${POSTGRES_PASS:-archiops2024}
    volumes:
      - gitea-data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "${GITEA_HTTP_PORT:-3002}:3000"
      - "${GITEA_SSH_PORT:-2222}:22"
    depends_on:
      - postgres
    networks:
      - archiops-network

  # Prometheus - System Monitoring
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: archiops-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - archiops-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Grafana - Architecture Dashboards & Metrics
  grafana:
    image: grafana/grafana:10.2.0
    container_name: archiops-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASS:-archiops123}
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
      - GF_SERVER_ROOT_URL=http://localhost:3003
    volumes:
      - grafana-data:/var/lib/grafana
      - ./configs/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    ports:
      - "${GRAFANA_PORT:-3003}:3000"
    depends_on:
      - prometheus
    networks:
      - archiops-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  archiops-network:
    driver: bridge
    name: archiops-network

volumes:
  postgres-data:
    name: archiops-postgres-data
  redis-data:
    name: archiops-redis-data
  minio-data:
    name: archiops-minio-data
  freecad-config:
    name: archiops-freecad-config
  freecad-projects:
    name: archiops-freecad-projects
  bimserver-data:
    name: archiops-bimserver-data
  rabbitmq-data:
    name: archiops-rabbitmq-data
  elasticsearch-data:
    name: archiops-elasticsearch-data
  metabase-data:
    name: archiops-metabase-data
  gitea-data:
    name: archiops-gitea-data
  prometheus-data:
    name: archiops-prometheus-data
  grafana-data:
    name: archiops-grafana-data
