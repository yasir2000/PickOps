# Agent Configuration — ArchiOps
# Auto-generated by generate_agent_structures.py

agent:
  id: archiops-agent
  name: "Architecture & Design Operations Agent"
  version: "1.0.0"
  domain: "ArchiOps"
  emoji: "🏛️"
  description: >
    Manage architectural design workflows, BIM models, project coordination, and compliance review.

llm:
  provider: ollama          # Switch to: openai | anthropic | azure
  model: llama3
  base_url: http://ollama:11434
  temperature: 0.1
  max_tokens: 4096
  fallback_provider: openai
  fallback_model: gpt-4o

memory:
  enabled: true
  provider: redis
  url: redis://redis:6379
  ttl_seconds: 86400
  vector_store: qdrant

tools:
  - name: minio
    enabled: true
  - name: postgresql
    enabled: true
  - name: ifc.js
    enabled: true
  - name: autodesk
    enabled: true
  - name: fastapi
    enabled: true
  - name: react
    enabled: true
  - name: pdf
    enabled: true

workflows:
  - bim-version-review
  - compliance-check-pipeline
  - multi-discipline-coordination
  - drawing-package-export

human_in_the_loop:
  enabled: true
  triggers:
    - destructive_action
    - high_cost_operation
    - compliance_critical
  approval_channel: slack
  timeout_seconds: 300

observability:
  tracing: true
  tracing_provider: langsmith
  metrics: true
  metrics_port: 9090
  log_level: INFO

security:
  secrets_provider: vault
  vault_addr: http://vault:8200
  credential_rotation_days: 90
  audit_log: true

rate_limits:
  requests_per_minute: 60
  tokens_per_minute: 100000
