version: '3.8'

services:
  helm-controller:
    image: fluxcd/helm-controller:latest
    container_name: appops-helm
    volumes:
      - helm_cache:/tmp
      - ./charts:/charts
    environment:
      - HELM_CACHE_HOME=/tmp/helm
    restart: unless-stopped
    networks:
      - appops-network

  unleash:
    image: unleashorg/unleash-server:latest
    container_name: appops-unleash
    ports:
      - "4242:4242"
    environment:
      - DATABASE_URL=postgres://unleash:${UNLEASH_DB_PASSWORD}@postgres:5432/unleash
      - DATABASE_SSL=false
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - appops-network

  flagsmith:
    image: flagsmith/flagsmith:latest
    container_name: appops-flagsmith
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://flagsmith:${FLAGSMITH_DB_PASSWORD}@postgres:5432/flagsmith
      - DJANGO_ALLOWED_HOSTS=*
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - appops-network

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: appops-jaeger
    ports:
      - "5775:5775/udp"
      - "6831:6831/udp"
      - "6832:6832/udp"
      - "5778:5778"
      - "16686:16686"
      - "14268:14268"
      - "14250:14250"
      - "9411:9411"
    environment:
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
      - COLLECTOR_OTLP_ENABLED=true
    volumes:
      - jaeger_data:/badger
    restart: unless-stopped
    networks:
      - appops-network

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: appops-zipkin
    ports:
      - "9411:9411"
    environment:
      - STORAGE_TYPE=mem
    restart: unless-stopped
    networks:
      - appops-network

  otel-collector:
    image: otel/opentelemetry-collector:latest
    container_name: appops-otel-collector
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
      - "8889:8889"
      - "13133:13133"
    volumes:
      - ./configs/otel-collector-config.yml:/etc/otel-collector-config.yml
    command: ["--config=/etc/otel-collector-config.yml"]
    restart: unless-stopped
    networks:
      - appops-network

  envoy:
    image: envoyproxy/envoy:latest
    container_name: appops-envoy
    ports:
      - "10000:10000"
      - "9901:9901"
    volumes:
      - ./configs/envoy.yaml:/etc/envoy/envoy.yaml
    command: /usr/local/bin/envoy -c /etc/envoy/envoy.yaml
    restart: unless-stopped
    networks:
      - appops-network

  linkerd-controller:
    image: cr.l5d.io/linkerd/controller:stable-2.14.0
    container_name: appops-linkerd
    ports:
      - "8084:8084"
    volumes:
      - linkerd_config:/var/lib/linkerd
    restart: unless-stopped
    networks:
      - appops-network

  kiali:
    image: quay.io/kiali/kiali:latest
    container_name: appops-kiali
    ports:
      - "20001:20001"
    environment:
      - PROMETHEUS_URL=http://prometheus:9090
      - GRAFANA_URL=http://grafana:3000
    volumes:
      - ./configs/kiali-config.yaml:/kiali-configuration/config.yaml
    restart: unless-stopped
    networks:
      - appops-network

  postgres:
    image: postgres:15
    container_name: appops-postgres
    environment:
      - POSTGRES_USER=appops
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_MULTIPLE_DATABASES=unleash,flagsmith
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - appops-network

  redis:
    image: redis:7-alpine
    container_name: appops-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - appops-network

  prometheus:
    image: prom/prometheus:latest
    container_name: appops-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    restart: unless-stopped
    networks:
      - appops-network

  grafana:
    image: grafana/grafana:latest
    container_name: appops-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    networks:
      - appops-network

volumes:
  helm_cache:
  jaeger_data:
  linkerd_config:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  appops-network:
    driver: bridge
