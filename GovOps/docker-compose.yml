version: '3.8'

services:
  # Government Portal - Citizen Services
  gov-portal:
    image: liferay/portal:7.4.3.120-ga120
    container_name: govops-portal
    ports:
      - "8080:8080"
    environment:
      - LIFERAY_SETUP_PERIOD_WIZARD_PERIOD_ENABLED=false
      - LIFERAY_ADMIN_EMAIL_FROM_ADDRESS=admin@gov.local
    volumes:
      - portal-data:/opt/liferay/data
    networks:
      - govops

  # Identity & Access Management - Keycloak
  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: govops-keycloak
    command: start-dev
    ports:
      - "8081:8080"
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_PASS:-admin}
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://postgres:5432/keycloak
      - KC_DB_USERNAME=keycloak
      - KC_DB_PASSWORD=keycloak
    depends_on:
      - postgres
    networks:
      - govops

  # Document Management - Alfresco
  alfresco:
    image: alfresco/alfresco-content-repository-community:7.4.1
    container_name: govops-alfresco
    ports:
      - "8082:8080"
    environment:
      - JAVA_OPTS=-Xms512m -Xmx2g
    volumes:
      - alfresco-data:/usr/local/tomcat/alf_data
    networks:
      - govops

  # Workflow Engine - Camunda
  camunda:
    image: camunda/camunda-bpm-platform:7.20.0
    container_name: govops-camunda
    ports:
      - "8083:8080"
    environment:
      - DB_DRIVER=org.postgresql.Driver
      - DB_URL=jdbc:postgresql://postgres:5432/camunda
      - DB_USERNAME=camunda
      - DB_PASSWORD=camunda
    depends_on:
      - postgres
    networks:
      - govops

  # Case Management - OpenCase
  opencase:
    image: postgres:15-alpine
    container_name: govops-cases
    environment:
      - POSTGRES_DB=cases
      - POSTGRES_USER=cases
      - POSTGRES_PASSWORD=cases
    volumes:
      - cases-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - govops

  # E-Government Services API
  egov-api:
    image: kong:3.4-alpine
    container_name: govops-api-gateway
    ports:
      - "8084:8000"
      - "8444:8443"
      - "8085:8001"
    environment:
      - KONG_DATABASE=postgres
      - KONG_PG_HOST=postgres
      - KONG_PG_DATABASE=kong
      - KONG_PG_USER=kong
      - KONG_PG_PASSWORD=kong
      - KONG_ADMIN_LISTEN=0.0.0.0:8001
    depends_on:
      - postgres
    networks:
      - govops

  # GIS System - GeoServer
  geoserver:
    image: kartoza/geoserver:2.24.0
    container_name: govops-geoserver
    ports:
      - "8086:8080"
    environment:
      - GEOSERVER_ADMIN_USER=admin
      - GEOSERVER_ADMIN_PASSWORD=${GEOSERVER_PASS:-admin}
      - STABLE_EXTENSIONS=wps,csw
    volumes:
      - geoserver-data:/opt/geoserver/data_dir
    networks:
      - govops

  # Census & Statistics - Apache Superset
  superset:
    image: apache/superset:3.0.0
    container_name: govops-superset
    ports:
      - "8087:8088"
    environment:
      - SUPERSET_SECRET_KEY=${SUPERSET_SECRET:-change_this_secret_key}
    volumes:
      - superset-data:/app/superset_home
    networks:
      - govops

  # Public Records - PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: govops-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=govops
      - POSTGRES_PASSWORD=${POSTGRES_PASS:-govops}
      - POSTGRES_MULTIPLE_DATABASES=keycloak,camunda,kong,records
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-dbs.sh:/docker-entrypoint-initdb.d/init-dbs.sh
    networks:
      - govops

  # Elections System - OpenElections
  elections:
    image: redis:7-alpine
    container_name: govops-elections
    ports:
      - "6379:6379"
    volumes:
      - elections-data:/data
    command: redis-server --appendonly yes
    networks:
      - govops

  # Public Procurement - Odoo
  odoo:
    image: odoo:17.0
    container_name: govops-procurement
    ports:
      - "8088:8069"
    environment:
      - HOST=postgres
      - USER=odoo
      - PASSWORD=odoo
    depends_on:
      - postgres
    volumes:
      - odoo-data:/var/lib/odoo
    networks:
      - govops

  # Monitoring & Analytics - Metabase
  metabase:
    image: metabase/metabase:v0.48.0
    container_name: govops-metabase
    ports:
      - "3000:3000"
    environment:
      - MB_DB_TYPE=postgres
      - MB_DB_DBNAME=metabase
      - MB_DB_PORT=5432
      - MB_DB_USER=metabase
      - MB_DB_PASS=metabase
      - MB_DB_HOST=postgres
    depends_on:
      - postgres
    volumes:
      - metabase-data:/metabase-data
    networks:
      - govops

  # Message Queue - RabbitMQ
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: govops-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=admin
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - govops

  # Search Engine - Elasticsearch
  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: govops-elasticsearch
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - govops

  # Monitoring - Prometheus
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: govops-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - govops

  # Dashboards - Grafana
  grafana:
    image: grafana/grafana:10.2.0
    container_name: govops-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASS:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - govops

networks:
  govops:
    driver: bridge

volumes:
  portal-data:
  alfresco-data:
  cases-data:
  geoserver-data:
  superset-data:
  postgres-data:
  elections-data:
  odoo-data:
  metabase-data:
  rabbitmq-data:
  es-data:
  prometheus-data:
  grafana-data:
